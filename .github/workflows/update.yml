name: Weekly Trial Update

on:
  schedule:
    - cron: "0 8 * * *" #Daily at 8am UTC.
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - name: Run updater
        env:
          DB_PATH:    raretrials.db
          CACHE_PATH: public/trials_cache.json
          DIGEST_PATH: public/update_digest.json
        run: python backend/updater.py
      - name: Commit cache
        run: |
          git config user.name  "RareTrials Bot"
          git config user.email "bot@raretrials"
          git add public/trials_cache.json public/update_digest.json
          git diff --staged --quiet || git commit -m "chore: weekly trial data update $(date +%Y-%m-%d)"
          git push
